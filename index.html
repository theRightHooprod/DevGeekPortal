<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">

	<title>Dev Geek Portal</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
		crossorigin="anonymous">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

	<link rel="icon" href="./favicon.png" type="image/x-icon">
</head>

<body>

	<!-- Modal -->
	<div class="modal fade" id="app-modal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="modal-label-title">Modal title</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>
				<div id="modal-body" class="modal-body text-center">
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary"
						data-bs-dismiss="modal">Close</button>
					<button type="button" class="btn btn-primary">Save changes</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Alert -->
	<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
		<div id="custom-toast" class="toast hide align-items-center text-white bg-danger border-0" role="alert"
			aria-live="assertive" aria-atomic="true">
			<div class="d-flex">
				<div class="toast-body">
					An error has occurred, please try again later.
				</div>
				<button type="button" class="btn-close btn-close-white me-2 m-auto"
					data-bs-dismiss="toast" aria-label="Close"></button>
			</div>
		</div>
	</div>

	<nav class="navbar navbar-dark bg-dark mb-3">
		<div class="container-md justify-content-center justify-content-md-between">
			<a class="navbar-brand">Dev Geek Portal</a>
			<div class="d-md-flex">
				<input id="search-character" class="form-control me-2" type="search"
					placeholder="Type a name..." aria-label="Search">
			</div>
		</div>
	</nav>

	<div id="spinner-container" style="display: none;" class="text-center">
		<div class="spinner-grow" role="status">
			<span class="visually-hidden">Loading...</span>
		</div>
	</div>

	<div id="body-container" class="container">
		<div id="character-containers" class="row row-cols-auto gap-3 justify-content-center py-3"></div>

		<div class="d-flex justify-content-center align-items-center">
			<button id="nextButton" class="btn btn-primary" style="display: none;" type="button">Load
				More...</button>
		</div>

	</div>

	<div class="container">
		<footer class="d-flex flex-wrap justify-content-center align-items-center py-3 my-4 border-top">
			<p class="col-md-4 mb-0 text-muted text-center">&copy; 2026 Dev Geek Portal</p>
		</footer>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
		crossorigin="anonymous"></script>
	<script src="https://code.jquery.com/jquery-4.0.0.min.js"
		integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

	<script src="script.js"></script>
</body>

</html>
